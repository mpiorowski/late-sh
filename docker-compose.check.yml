services:
  postgres:
    image: postgres:18
    # Durability off: this check DB is recreated and torn down (down -v) every
    # `make check` / `checkci` run, so its data never needs to survive a crash.
    # Skipping per-commit WAL fsync roughly halves warm `make checkci` wall time.
    # Mirrors the CI test DB (.github/workflows/ci.yml). max_connections headroom
    # for parallel nextest test databases.
    command:
      - postgres
      - -c
      - fsync=off
      - -c
      - synchronous_commit=off
      - -c
      - full_page_writes=off
      - -c
      - max_connections=200
    ports:
      - "${CHECK_PG_HOST_PORT:-55433}:5432"
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 60s
    stop_grace_period: 2m
