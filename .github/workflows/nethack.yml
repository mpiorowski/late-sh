name: nethack

# Dedicated CI/CD for the NetHack door, responsible only for the from-source
# binary image (docker/doors/nethack.Dockerfile):
#   - build_validate: compile the door Dockerfile and prove the binary works
#     and that the writable state is split out of HACKDIR (VAR_PLAYGROUND). Runs
#     on changes to the build and weekly, to catch upstream / Lua / checksum
#     breakage early (the build fetches Lua over the network).
#   - push_image: on push to main, publish the image the root Dockerfile pins
#     as its nethack-build stage (ghcr door-nethack, tag from DOOR_IMAGE_TAG).
#   - deploy_seed: manual, per-environment. Verifies the live service-ssh pod has
#     the nethack-save PVC mounted, writable, with save/ present and the door
#     enabled. The initContainer seeds on every rollout; this re-checks (and
#     re-seeds idempotently) without running Terraform. Full infra applies stay
#     in deploy_infra.yml.
#
# The late-nethack host image (runtime-nethack) builds from the root Dockerfile
# in deploy_nethack.yml; it is not built here.

on:
  pull_request:
    paths:
      - docker/doors/nethack.Dockerfile
      - .github/workflows/nethack.yml
  push:
    branches: [main]
    paths:
      - docker/doors/nethack.Dockerfile
      - .github/workflows/nethack.yml
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  workflow_dispatch:
    inputs:
      run_deploy_seed:
        description: "Also verify/seed the live pod after building"
        required: false
        default: false
        type: boolean
      environment:
        description: "Target environment for deploy_seed"
        required: false
        default: production
        type: choice
        options:
          - production
          - staging

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

# The published door image tag. Must match the pin in the root Dockerfile's
# nethack-build stage; bump both together on any recipe change.
env:
  DOOR_IMAGE_TAG: 5.0.0-r1

jobs:
  build_validate:
    name: build_validate_nethack_stage
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: checkout
        uses: actions/checkout@v5

      - name: setup_docker_buildx
        uses: docker/setup-buildx-action@v4

      # Build the door Dockerfile and load it locally so we can run the
      # binary. The stage itself already asserts the binary lands in HACKDIR and
      # that save/ was seeded under VAR_PLAYGROUND; we re-prove both at runtime.
      - name: build_nethack_stage
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/doors/nethack.Dockerfile
          platforms: linux/amd64
          push: false
          load: true
          tags: nethack-build:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: smoke_test_binary
        run: |
          docker run --rm nethack-build:ci /var/games/nethack/nethack --version

      # Prove the A1 split actually compiled in and the install seeded save/.
      # GCC lowers the constant-path copy into immediate stores, so `strings`
      # cannot reliably find VAR_PLAYGROUND in the optimized binary. Instead,
      # run the score reader as an unprivileged user with a temporary playground
      # and verify that it reads record from there. If it falls back to HACKDIR,
      # the temporary record's access time remains unchanged.
      - name: verify_var_playground_split
        run: |
          docker run --rm nethack-build:ci test -d /var/games/nethack-var/save
          docker run --rm \
            --user 65534:65534 \
            --tmpfs /var/games/nethack-var:rw,mode=1777,strictatime \
            nethack-build:ci sh -c '
            set -eu
            record=/var/games/nethack-var/record
            : > "$record"
            touch -a -d @1 "$record"
            before=$(stat -c %X "$record")
            /var/games/nethack/nethack -s >/dev/null
            after=$(stat -c %X "$record")
            test "$after" -gt "$before"
          '

  push_image:
    name: push_door_nethack_image
    needs: build_validate
    # push: keep the published image in sync with main. workflow_dispatch: the
    # manual bootstrap/re-push lever (first publication happens from the branch
    # that introduces the door Dockerfile, before the root Dockerfile pin can
    # resolve). Scheduled runs never push: the weekly drift check must not
    # silently mutate a pinned tag.
    if: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write
    steps:
      - name: checkout
        uses: actions/checkout@v5

      - name: setup_docker_buildx
        uses: docker/setup-buildx-action@v4

      - name: login_to_ghcr
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Publish the image the root Dockerfile pins as its nethack-build stage.
      # The tag is stable per recipe revision, so re-pushing it on an unrelated
      # main push is a layer-cached no-op.
      - name: push_door_image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/doors/nethack.Dockerfile
          platforms: linux/amd64
          push: true
          tags: ghcr.io/${{ github.repository }}/door-nethack:${{ env.DOOR_IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy_seed:
    name: deploy_seed_verify
    needs: build_validate
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_deploy_seed }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: ${{ inputs.environment }}
    steps:
      - name: setup_kubectl
        uses: azure/setup-kubectl@v5

      - name: set_kubernetes_context
        uses: azure/k8s-set-context@v5
        with:
          kubeconfig: ${{ secrets.KUBE_CONFIG }}

      - name: wait_for_rollout
        run: kubectl rollout status deployment/late-nethack -n default --timeout=120s

      # Idempotent re-seed + write check against the live PVC, as the late user
      # (the user the late-nethack host runs nethack as). mkdir -p / touch never
      # clobber existing saves or bones. Fails if the mount is missing or not
      # writable. The PVC is mounted by the late-nethack pod (not service-ssh).
      - name: verify_and_seed_save_dir
        run: |
          POD=$(kubectl get pod -l app=late-nethack -n default -o jsonpath='{.items[0].metadata.name}')
          echo "late-nethack pod: ${POD}"
          kubectl exec "${POD}" -- sh -c '
            set -e
            mkdir -p /var/games/nethack-var/save
            touch /var/games/nethack-var/record
            test -w /var/games/nethack-var/save
            test -w /var/games/nethack-var/record
            echo "save dir OK:" && ls -la /var/games/nethack-var
          '

      - name: verify_door_enabled
        run: |
          POD=$(kubectl get pod -l app=service-ssh -n default -o jsonpath='{.items[0].metadata.name}')
          enabled=$(kubectl exec "${POD}" -- printenv LATE_NETHACK_ENABLED || true)
          echo "LATE_NETHACK_ENABLED=${enabled}"
          case "$(echo "${enabled}" | tr '[:upper:]' '[:lower:]')" in
            1|true|yes|on) echo "door enabled" ;;
            *) echo "::warning::NetHack door is not enabled (LATE_NETHACK_ENABLED=${enabled})" ;;
          esac
