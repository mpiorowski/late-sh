name: ci

on:
  workflow_call:
    inputs:
      package:
        description: "Cargo package to check (empty = whole workspace)"
        required: false
        type: string
        default: ""
      source_ref:
        description: "Git ref to check out"
        required: false
        type: string
        default: ""

permissions:
  contents: read

# CI speed layout:
# - fmt, clippy, and test run as parallel jobs: wall time is the slowest job,
#   not the sum.
# - Rust dependency artifacts are cached (Swatinem/rust-cache). The action
#   prunes workspace crates before saving and keys on rustc version + lockfile
#   hash, so first-party code is always compiled fresh; a stale-but-compatible
#   cache can only cost a dependency rebuild, never wrong artifacts. It also
#   sets CARGO_INCREMENTAL=0.
# - Caches are saved only on main pushes (save-if below; main.yml keeps them
#   warm). PR runs restore, never save.
# - `clippy + test` is a tiny aggregator job (see its comment) that reproduces
#   the branch-protection-required status-check name now that clippy and test
#   run as separate parallel jobs.
# - To purge all Rust caches: bump CACHE_PREFIX below (any new value starts a
#   fresh cache namespace; old entries age out via LRU), or delete entries
#   directly with `gh cache list` / `gh cache delete`, or in the repo UI under
#   Actions -> Management -> Caches.
env:
  CACHE_PREFIX: rust-v1
  # No full debuginfo in CI: faster compiles and links, far smaller caches.
  # line-tables-only keeps file:line in test-failure backtraces.
  CARGO_PROFILE_DEV_DEBUG: line-tables-only

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.source_ref || github.ref }}
      - name: install_rustfmt
        run: rustup component add rustfmt
      - name: cargo_fmt_check
        run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.source_ref || github.ref }}
      - name: install_linux_build_dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libasound2-dev libwebkit2gtk-4.1-dev pkg-config mold
      - name: restore_rust_cache
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: ${{ env.CACHE_PREFIX }}
          shared-key: ci-clippy
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: install_clippy
        run: rustup component add clippy
      - name: cargo_clippy
        env:
          CARGO_PACKAGE: ${{ inputs.package }}
        run: |
          package_args=(--workspace)
          if [ -n "$CARGO_PACKAGE" ]; then
            package_args=(-p "$CARGO_PACKAGE")
          fi

          cargo clippy "${package_args[@]}" --all-targets --features otel -- -D warnings

  test:
    name: test
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.source_ref || github.ref }}
      # Plain `docker run` instead of a job-level service so we can pass server
      # flags: durability off (test databases are disposable) and
      # max_connections sized for nextest --test-threads 8 with
      # TEST_DB_POOL_SIZE=8 per test database. Started first so postgres boots
      # while the toolchain and build deps install.
      - name: start_postgres
        run: |
          docker run -d --name ci-postgres \
            -e POSTGRES_USER=test \
            -e POSTGRES_PASSWORD=test \
            -e POSTGRES_DB=postgres \
            -p 5432:5432 \
            postgres:18-alpine \
            postgres -c fsync=off -c synchronous_commit=off -c full_page_writes=off -c max_connections=200
      - name: install_linux_build_dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libasound2-dev libwebkit2gtk-4.1-dev pkg-config mold
      - name: restore_rust_cache
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: ${{ env.CACHE_PREFIX }}
          shared-key: ci-test
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: install_nextest
        uses: taiki-e/install-action@nextest
      - name: wait_for_postgres
        run: |
          for _ in $(seq 1 60); do
            if docker exec ci-postgres pg_isready -U test -d postgres >/dev/null 2>&1; then
              exit 0
            fi
            sleep 1
          done
          echo "postgres never became ready" >&2
          docker logs ci-postgres >&2
          exit 1
      - name: cargo_test
        env:
          TEST_DATABASE_URL: "host=127.0.0.1 port=5432 user=test password=test dbname=postgres"
          CARGO_PACKAGE: ${{ inputs.package }}
        run: |
          package_args=(--workspace)
          if [ -n "$CARGO_PACKAGE" ]; then
            package_args=(-p "$CARGO_PACKAGE")
          fi

          cargo nextest run "${package_args[@]}" --all-targets --test-threads 8
      - name: dump_postgres_logs
        if: failure()
        run: docker logs ci-postgres

  # Branch protection requires a status check named "ci / clippy + test" — the
  # name of the old single job that has since been split into the parallel
  # `clippy` and `test` jobs above. This aggregator reproduces that exact check
  # context (the check name is "<caller job> / <this job's name>" = "ci /
  # clippy + test"), so the required check is satisfied without editing branch
  # protection. It is a thin serial tail: it waits for both jobs and fails
  # unless both succeeded. `if: always()` + the explicit result check are load-
  # bearing — without them a failed upstream job would leave this gate skipped,
  # which a required check can misreport as passing.
  clippy_and_test:
    name: clippy + test
    needs: [clippy, test]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: require_success
        env:
          CLIPPY_RESULT: ${{ needs.clippy.result }}
          TEST_RESULT: ${{ needs.test.result }}
        run: |
          echo "clippy=$CLIPPY_RESULT test=$TEST_RESULT"
          if [ "$CLIPPY_RESULT" = "success" ] && [ "$TEST_RESULT" = "success" ]; then
            echo "both required jobs succeeded"
          else
            echo "clippy + test gate failed: clippy=$CLIPPY_RESULT test=$TEST_RESULT" >&2
            exit 1
          fi
