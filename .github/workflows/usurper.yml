name: usurper

# Dedicated CI/CD for the Usurper door, responsible only for the from-source
# binary image (docker/doors/usurper.Dockerfile):
#   - build_validate: compile the door Dockerfile (Free Pascal build of
#     USURPER.EXE + EDITOR.EXE plus the scripted EDITOR reset that generates
#     the seed world data) and prove the artifacts landed. Runs on changes to
#     the build and weekly, to catch upstream / checksum breakage early (the
#     build fetches a pinned tarball from GitHub over the network).
#   - push_image: on push to main, publish the image the root Dockerfile pins
#     as its usurper-build stage (ghcr door-usurper, tag from DOOR_IMAGE_TAG).
#   - verify_deployed: manual, per-environment. Confirms the live late-usurper
#     deployment is rolled out and the door is enabled on service-ssh.
#
# The late-usurper host image (runtime-usurper) builds from the root Dockerfile
# in deploy_usurper.yml; it is not built here.

on:
  pull_request:
    paths:
      - docker/doors/usurper.Dockerfile
      - scripts/usurper_seed_data.py
      - .github/workflows/usurper.yml
  push:
    branches: [main]
    paths:
      - docker/doors/usurper.Dockerfile
      - scripts/usurper_seed_data.py
      - .github/workflows/usurper.yml
  schedule:
    - cron: "0 6 * * 4" # Thursdays 06:00 UTC (staggered a day after dcss')
  workflow_dispatch:
    inputs:
      run_verify_deployed:
        description: "Also verify the door is enabled on the live pod after building"
        required: false
        default: false
        type: boolean
      environment:
        description: "Target environment for verify_deployed"
        required: false
        default: production
        type: choice
        options:
          - production
          - staging

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

# The published door image tag. Must match the pin in the root Dockerfile's
# usurper-build stage; bump both together on any recipe change.
env:
  DOOR_IMAGE_TAG: 0.25-r1

jobs:
  build_validate:
    name: build_validate_usurper_stage
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: checkout
        uses: actions/checkout@v5

      - name: setup_docker_buildx
        uses: docker/setup-buildx-action@v4

      # Build the door Dockerfile and load it locally so we can probe
      # the artifacts. The stage itself already asserts the binaries and the
      # generated seed world files fail-closed; we re-prove them here.
      - name: build_usurper_stage
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/doors/usurper.Dockerfile
          platforms: linux/amd64
          push: false
          load: true
          tags: usurper-build:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: smoke_test_artifacts
        run: |
          docker run --rm usurper-build:ci sh -c '
            test -x /opt/usurper/bin/USURPER.EXE &&
            test -x /opt/usurper/bin/EDITOR.EXE &&
            test -s /opt/usurper/seed/DATA/MONSTER.DAT &&
            test -s /opt/usurper/seed/DATA/NPCS.DAT &&
            test -s /opt/usurper/seed/USURPER.CFG &&
            test -s /opt/usurper/seed/TEXT/MAINMENU.ANS &&
            test -s /opt/usurper/seed/COPYING'

  push_image:
    name: push_door_usurper_image
    needs: build_validate
    # push: keep the published image in sync with main. workflow_dispatch: the
    # manual bootstrap/re-push lever (first publication happens from the branch
    # that introduces the door Dockerfile, before the root Dockerfile pin can
    # resolve). Scheduled runs never push: the weekly drift check must not
    # silently mutate a pinned tag.
    if: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write
    steps:
      - name: checkout
        uses: actions/checkout@v5

      - name: setup_docker_buildx
        uses: docker/setup-buildx-action@v4

      - name: login_to_ghcr
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Publish the image the root Dockerfile pins as its usurper-build stage.
      # The tag is stable per recipe revision, so re-pushing it on an unrelated
      # main push is a layer-cached no-op.
      - name: push_door_image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/doors/usurper.Dockerfile
          platforms: linux/amd64
          push: true
          tags: ghcr.io/${{ github.repository }}/door-usurper:${{ env.DOOR_IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  verify_deployed:
    name: verify_deployed
    needs: build_validate
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_verify_deployed }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: ${{ inputs.environment }}
    steps:
      - name: setup_kubectl
        uses: azure/setup-kubectl@v5

      - name: set_kubernetes_context
        uses: azure/k8s-set-context@v5
        with:
          kubeconfig: ${{ secrets.KUBE_CONFIG }}

      - name: wait_for_rollout
        run: kubectl rollout status deployment/late-usurper -n default --timeout=180s

      - name: verify_door_enabled
        run: |
          # LATE_USURPER_ENABLED is a CLIENT flag: it lives on service-ssh
          # (which reaches the host over SSH), NOT on the late-usurper host
          # pod. Read it there, mirroring dcss.yml.
          POD=$(kubectl get pod -l app=service-ssh -n default -o jsonpath='{.items[0].metadata.name}')
          echo "service-ssh pod: ${POD}"
          enabled=$(kubectl exec "${POD}" -- printenv LATE_USURPER_ENABLED || true)
          echo "LATE_USURPER_ENABLED=${enabled}"
          case "$(echo "${enabled}" | tr '[:upper:]' '[:lower:]')" in
            1|true|yes|on) echo "door enabled" ;;
            *) echo "::warning::Usurper door is not enabled (LATE_USURPER_ENABLED=${enabled})" ;;
          esac
