name: brogue

# Dedicated CI/CD for the Brogue door, responsible only for the from-source
# binary image (docker/doors/brogue.Dockerfile):
#   - build_validate: compile the door Dockerfile and prove the binary runs
#     (--version resolves the baked version info; the stage itself asserts the
#     hangup-save patch applied). Runs on changes to the build and weekly, to
#     catch upstream / checksum breakage early (the build fetches a pinned
#     tarball from GitHub over the network).
#   - push_image: on push to main, publish the image the root Dockerfile pins
#     as its brogue-build stage (ghcr door-brogue, tag from DOOR_IMAGE_TAG).
#   - verify_deployed: manual, per-environment. Confirms the live late-brogue
#     deployment is rolled out and the door is enabled on service-ssh.
#
# The late-brogue host image (runtime-brogue) builds from the root Dockerfile
# in deploy_brogue.yml; it is not built here.

on:
  pull_request:
    paths:
      - docker/doors/brogue.Dockerfile
      - scripts/brogue_hangup_save.patch
      - .github/workflows/brogue.yml
  push:
    branches: [main]
    paths:
      - docker/doors/brogue.Dockerfile
      - scripts/brogue_hangup_save.patch
      - .github/workflows/brogue.yml
  schedule:
    - cron: "0 6 * * 5" # Fridays 06:00 UTC (staggered a day after usurper's)
  workflow_dispatch:
    inputs:
      run_verify_deployed:
        description: "Also verify the door is enabled on the live pod after building"
        required: false
        default: false
        type: boolean
      environment:
        description: "Target environment for verify_deployed"
        required: false
        default: production
        type: choice
        options:
          - production
          - staging

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

# The published door image tag. Must match the pin in the root Dockerfile's
# brogue-build stage; bump both together on any recipe change.
env:
  DOOR_IMAGE_TAG: 1.15.1-r1

jobs:
  build_validate:
    name: build_validate_brogue_stage
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: checkout
        uses: actions/checkout@v5

      - name: setup_docker_buildx
        uses: docker/setup-buildx-action@v4

      # Build the door Dockerfile and load it locally so we can run the
      # binary. The stage itself already asserts the patch applied and the
      # version string; we re-prove the binary actually runs here.
      - name: build_brogue_stage
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/doors/brogue.Dockerfile
          platforms: linux/amd64
          push: false
          load: true
          tags: brogue-build:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: smoke_test_binary
        run: |
          docker run --rm brogue-build:ci /opt/brogue/brogue --version

  push_image:
    name: push_door_brogue_image
    needs: build_validate
    # push: keep the published image in sync with main. workflow_dispatch: the
    # manual bootstrap/re-push lever (first publication happens from the branch
    # that introduces the door Dockerfile, before the root Dockerfile pin can
    # resolve). Scheduled runs never push: the weekly drift check must not
    # silently mutate a pinned tag.
    if: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write
    steps:
      - name: checkout
        uses: actions/checkout@v5

      - name: setup_docker_buildx
        uses: docker/setup-buildx-action@v4

      - name: login_to_ghcr
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Publish the image the root Dockerfile pins as its brogue-build stage.
      # The tag is stable per recipe revision, so re-pushing it on an unrelated
      # main push is a layer-cached no-op.
      - name: push_door_image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/doors/brogue.Dockerfile
          platforms: linux/amd64
          push: true
          tags: ghcr.io/${{ github.repository }}/door-brogue:${{ env.DOOR_IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  verify_deployed:
    name: verify_deployed
    needs: build_validate
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_verify_deployed }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: ${{ inputs.environment }}
    steps:
      - name: setup_kubectl
        uses: azure/setup-kubectl@v5

      - name: set_kubernetes_context
        uses: azure/k8s-set-context@v5
        with:
          kubeconfig: ${{ secrets.KUBE_CONFIG }}

      - name: wait_for_rollout
        run: kubectl rollout status deployment/late-brogue -n default --timeout=180s

      - name: verify_door_enabled
        run: |
          # LATE_BROGUE_ENABLED is a CLIENT flag: it lives on service-ssh
          # (which reaches the host over SSH), NOT on the late-brogue host pod.
          # Read it there, mirroring dcss.yml.
          POD=$(kubectl get pod -l app=service-ssh -n default -o jsonpath='{.items[0].metadata.name}')
          echo "service-ssh pod: ${POD}"
          enabled=$(kubectl exec "${POD}" -- printenv LATE_BROGUE_ENABLED || true)
          echo "LATE_BROGUE_ENABLED=${enabled}"
          case "$(echo "${enabled}" | tr '[:upper:]' '[:lower:]')" in
            1|true|yes|on) echo "door enabled" ;;
            *) echo "::warning::Brogue door is not enabled (LATE_BROGUE_ENABLED=${enabled})" ;;
          esac
