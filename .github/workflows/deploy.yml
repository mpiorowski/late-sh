name: deploy

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to deploy, for example v0.27.11"
        required: true
        type: string
      environment:
        description: "Deployment environment"
        required: true
        default: production
        type: choice
        options:
          - production
          - staging

concurrency:
  group: ${{ ((github.event_name == 'workflow_dispatch' && !endsWith(inputs.release_tag, '-infra') && !endsWith(inputs.release_tag, '-cli') && !endsWith(inputs.release_tag, '-web') && !endsWith(inputs.release_tag, '-nethack') && !endsWith(inputs.release_tag, '-dopewars') && !endsWith(inputs.release_tag, '-dcss') && !endsWith(inputs.release_tag, '-usurper') && !endsWith(inputs.release_tag, '-brogue')) || (github.event_name != 'workflow_dispatch' && !endsWith(github.ref, '-infra') && !endsWith(github.ref, '-cli') && !endsWith(github.ref, '-web') && !endsWith(github.ref, '-nethack') && !endsWith(github.ref, '-dopewars') && !endsWith(github.ref, '-dcss') && !endsWith(github.ref, '-usurper') && !endsWith(github.ref, '-brogue'))) && format('deploy-standard-{0}', github.event_name == 'workflow_dispatch' && inputs.environment || (github.event.release.prerelease && 'staging' || 'production')) || format('{0}-{1}', github.workflow, github.run_id) }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  ci:
    name: ci
    if: ${{ (github.event_name == 'workflow_dispatch' && !endsWith(inputs.release_tag, '-infra') && !endsWith(inputs.release_tag, '-cli') && !endsWith(inputs.release_tag, '-web') && !endsWith(inputs.release_tag, '-nethack') && !endsWith(inputs.release_tag, '-dopewars') && !endsWith(inputs.release_tag, '-dcss') && !endsWith(inputs.release_tag, '-usurper') && !endsWith(inputs.release_tag, '-brogue')) || (github.event_name != 'workflow_dispatch' && !endsWith(github.ref, '-infra') && !endsWith(github.ref, '-cli') && !endsWith(github.ref, '-web') && !endsWith(github.ref, '-nethack') && !endsWith(github.ref, '-dopewars') && !endsWith(github.ref, '-dcss') && !endsWith(github.ref, '-usurper') && !endsWith(github.ref, '-brogue')) }}
    uses: ./.github/workflows/ci.yml
    with:
      package: late-ssh
      source_ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref }}

  build_ssh:
    name: build_late_ssh_image
    if: ${{ (github.event_name == 'workflow_dispatch' && !endsWith(inputs.release_tag, '-infra') && !endsWith(inputs.release_tag, '-cli') && !endsWith(inputs.release_tag, '-web') && !endsWith(inputs.release_tag, '-nethack') && !endsWith(inputs.release_tag, '-dopewars') && !endsWith(inputs.release_tag, '-dcss') && !endsWith(inputs.release_tag, '-usurper') && !endsWith(inputs.release_tag, '-brogue')) || (github.event_name != 'workflow_dispatch' && !endsWith(github.ref, '-infra') && !endsWith(github.ref, '-cli') && !endsWith(github.ref, '-web') && !endsWith(github.ref, '-nethack') && !endsWith(github.ref, '-dopewars') && !endsWith(github.ref, '-dcss') && !endsWith(github.ref, '-usurper') && !endsWith(github.ref, '-brogue')) }}
    needs: ci
    uses: ./.github/workflows/build.yml
    permissions:
      contents: read
      packages: write
    secrets: inherit
    with:
      registry: ghcr.io
      image_name: late-ssh
      image_tag: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.event.release.tag_name }}
      context: .
      dockerfile: ./Dockerfile
      docker_target: runtime-ssh
      environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || (github.event.release.prerelease && 'staging' || 'production') }}
      source_ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref }}

  get_web_image:
    name: get_current_web_image_tag
    if: ${{ (github.event_name == 'workflow_dispatch' && !endsWith(inputs.release_tag, '-infra') && !endsWith(inputs.release_tag, '-cli') && !endsWith(inputs.release_tag, '-web') && !endsWith(inputs.release_tag, '-nethack') && !endsWith(inputs.release_tag, '-dopewars') && !endsWith(inputs.release_tag, '-dcss') && !endsWith(inputs.release_tag, '-usurper') && !endsWith(inputs.release_tag, '-brogue')) || (github.event_name != 'workflow_dispatch' && !endsWith(github.ref, '-infra') && !endsWith(github.ref, '-cli') && !endsWith(github.ref, '-web') && !endsWith(github.ref, '-nethack') && !endsWith(github.ref, '-dopewars') && !endsWith(github.ref, '-dcss') && !endsWith(github.ref, '-usurper') && !endsWith(github.ref, '-brogue')) }}
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || (github.event.release.prerelease && 'staging' || 'production') }}
    outputs:
      web_image_tag: ${{ steps.web_image.outputs.image_tag }}
    steps:
      - name: setup_kubectl
        uses: azure/setup-kubectl@v5

      - name: set_kubernetes_context
        uses: azure/k8s-set-context@v5
        with:
          kubeconfig: ${{ secrets.KUBE_CONFIG }}

      - name: get_web_image_tag
        id: web_image
        run: |
          tag=$(kubectl get deployment service-web -n default -o jsonpath='{.spec.template.spec.containers[0].image}')
          echo "image_tag=$tag" >> "$GITHUB_OUTPUT"

  get_nethack_image:
    name: get_current_nethack_image_tag
    if: ${{ (github.event_name == 'workflow_dispatch' && !endsWith(inputs.release_tag, '-infra') && !endsWith(inputs.release_tag, '-cli') && !endsWith(inputs.release_tag, '-web') && !endsWith(inputs.release_tag, '-nethack') && !endsWith(inputs.release_tag, '-dopewars') && !endsWith(inputs.release_tag, '-dcss') && !endsWith(inputs.release_tag, '-usurper') && !endsWith(inputs.release_tag, '-brogue')) || (github.event_name != 'workflow_dispatch' && !endsWith(github.ref, '-infra') && !endsWith(github.ref, '-cli') && !endsWith(github.ref, '-web') && !endsWith(github.ref, '-nethack') && !endsWith(github.ref, '-dopewars') && !endsWith(github.ref, '-dcss') && !endsWith(github.ref, '-usurper') && !endsWith(github.ref, '-brogue')) }}
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || (github.event.release.prerelease && 'staging' || 'production') }}
    outputs:
      nethack_image_tag: ${{ steps.nethack_image.outputs.image_tag }}
    steps:
      - name: setup_kubectl
        uses: azure/setup-kubectl@v5

      - name: set_kubernetes_context
        uses: azure/k8s-set-context@v5
        with:
          kubeconfig: ${{ secrets.KUBE_CONFIG }}

      - name: get_nethack_image_tag
        id: nethack_image
        run: |
          tag=$(kubectl get deployment late-nethack -n default -o jsonpath='{.spec.template.spec.containers[0].image}')
          echo "image_tag=$tag" >> "$GITHUB_OUTPUT"

  get_dopewars_image:
    name: get_current_dopewars_image_tag
    if: ${{ (github.event_name == 'workflow_dispatch' && !endsWith(inputs.release_tag, '-infra') && !endsWith(inputs.release_tag, '-cli') && !endsWith(inputs.release_tag, '-web') && !endsWith(inputs.release_tag, '-nethack') && !endsWith(inputs.release_tag, '-dopewars') && !endsWith(inputs.release_tag, '-dcss') && !endsWith(inputs.release_tag, '-usurper') && !endsWith(inputs.release_tag, '-brogue')) || (github.event_name != 'workflow_dispatch' && !endsWith(github.ref, '-infra') && !endsWith(github.ref, '-cli') && !endsWith(github.ref, '-web') && !endsWith(github.ref, '-nethack') && !endsWith(github.ref, '-dopewars') && !endsWith(github.ref, '-dcss') && !endsWith(github.ref, '-usurper') && !endsWith(github.ref, '-brogue')) }}
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || (github.event.release.prerelease && 'staging' || 'production') }}
    outputs:
      dopewars_image_tag: ${{ steps.dopewars_image.outputs.image_tag }}
    steps:
      - name: setup_kubectl
        uses: azure/setup-kubectl@v5

      - name: set_kubernetes_context
        uses: azure/k8s-set-context@v5
        with:
          kubeconfig: ${{ secrets.KUBE_CONFIG }}

      - name: get_dopewars_image_tag
        id: dopewars_image
        run: |
          tag=$(kubectl get deployment late-dopewars -n default -o jsonpath='{.spec.template.spec.containers[0].image}')
          echo "image_tag=$tag" >> "$GITHUB_OUTPUT"

  get_dcss_image:
    name: get_current_dcss_image_tag
    if: ${{ (github.event_name == 'workflow_dispatch' && !endsWith(inputs.release_tag, '-infra') && !endsWith(inputs.release_tag, '-cli') && !endsWith(inputs.release_tag, '-web') && !endsWith(inputs.release_tag, '-nethack') && !endsWith(inputs.release_tag, '-dopewars') && !endsWith(inputs.release_tag, '-dcss') && !endsWith(inputs.release_tag, '-usurper') && !endsWith(inputs.release_tag, '-brogue')) || (github.event_name != 'workflow_dispatch' && !endsWith(github.ref, '-infra') && !endsWith(github.ref, '-cli') && !endsWith(github.ref, '-web') && !endsWith(github.ref, '-nethack') && !endsWith(github.ref, '-dopewars') && !endsWith(github.ref, '-dcss') && !endsWith(github.ref, '-usurper') && !endsWith(github.ref, '-brogue')) }}
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || (github.event.release.prerelease && 'staging' || 'production') }}
    outputs:
      dcss_image_tag: ${{ steps.dcss_image.outputs.image_tag }}
    steps:
      - name: setup_kubectl
        uses: azure/setup-kubectl@v5

      - name: set_kubernetes_context
        uses: azure/k8s-set-context@v5
        with:
          kubeconfig: ${{ secrets.KUBE_CONFIG }}

      - name: get_dcss_image_tag
        id: dcss_image
        run: |
          tag=$(kubectl get deployment late-dcss -n default -o jsonpath='{.spec.template.spec.containers[0].image}')
          echo "image_tag=$tag" >> "$GITHUB_OUTPUT"

  get_usurper_image:
    name: get_current_usurper_image_tag
    if: ${{ (github.event_name == 'workflow_dispatch' && !endsWith(inputs.release_tag, '-infra') && !endsWith(inputs.release_tag, '-cli') && !endsWith(inputs.release_tag, '-web') && !endsWith(inputs.release_tag, '-nethack') && !endsWith(inputs.release_tag, '-dopewars') && !endsWith(inputs.release_tag, '-dcss') && !endsWith(inputs.release_tag, '-usurper') && !endsWith(inputs.release_tag, '-brogue')) || (github.event_name != 'workflow_dispatch' && !endsWith(github.ref, '-infra') && !endsWith(github.ref, '-cli') && !endsWith(github.ref, '-web') && !endsWith(github.ref, '-nethack') && !endsWith(github.ref, '-dopewars') && !endsWith(github.ref, '-dcss') && !endsWith(github.ref, '-usurper') && !endsWith(github.ref, '-brogue')) }}
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || (github.event.release.prerelease && 'staging' || 'production') }}
    outputs:
      usurper_image_tag: ${{ steps.usurper_image.outputs.image_tag }}
    steps:
      - name: setup_kubectl
        uses: azure/setup-kubectl@v5

      - name: set_kubernetes_context
        uses: azure/k8s-set-context@v5
        with:
          kubeconfig: ${{ secrets.KUBE_CONFIG }}

      - name: get_usurper_image_tag
        id: usurper_image
        run: |
          tag=$(kubectl get deployment late-usurper -n default -o jsonpath='{.spec.template.spec.containers[0].image}')
          echo "image_tag=$tag" >> "$GITHUB_OUTPUT"

  get_brogue_image:
    name: get_current_brogue_image_tag
    if: ${{ (github.event_name == 'workflow_dispatch' && !endsWith(inputs.release_tag, '-infra') && !endsWith(inputs.release_tag, '-cli') && !endsWith(inputs.release_tag, '-web') && !endsWith(inputs.release_tag, '-nethack') && !endsWith(inputs.release_tag, '-dopewars') && !endsWith(inputs.release_tag, '-dcss') && !endsWith(inputs.release_tag, '-usurper') && !endsWith(inputs.release_tag, '-brogue')) || (github.event_name != 'workflow_dispatch' && !endsWith(github.ref, '-infra') && !endsWith(github.ref, '-cli') && !endsWith(github.ref, '-web') && !endsWith(github.ref, '-nethack') && !endsWith(github.ref, '-dopewars') && !endsWith(github.ref, '-dcss') && !endsWith(github.ref, '-usurper') && !endsWith(github.ref, '-brogue')) }}
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || (github.event.release.prerelease && 'staging' || 'production') }}
    outputs:
      brogue_image_tag: ${{ steps.brogue_image.outputs.image_tag }}
    steps:
      - name: setup_kubectl
        uses: azure/setup-kubectl@v5

      - name: set_kubernetes_context
        uses: azure/k8s-set-context@v5
        with:
          kubeconfig: ${{ secrets.KUBE_CONFIG }}

      - name: get_brogue_image_tag
        id: brogue_image
        run: |
          tag=$(kubectl get deployment late-brogue -n default -o jsonpath='{.spec.template.spec.containers[0].image}')
          echo "image_tag=$tag" >> "$GITHUB_OUTPUT"

  terraform:
    name: terraform_apply
    if: ${{ (github.event_name == 'workflow_dispatch' && !endsWith(inputs.release_tag, '-infra') && !endsWith(inputs.release_tag, '-cli') && !endsWith(inputs.release_tag, '-web') && !endsWith(inputs.release_tag, '-nethack') && !endsWith(inputs.release_tag, '-dopewars') && !endsWith(inputs.release_tag, '-dcss') && !endsWith(inputs.release_tag, '-usurper') && !endsWith(inputs.release_tag, '-brogue')) || (github.event_name != 'workflow_dispatch' && !endsWith(github.ref, '-infra') && !endsWith(github.ref, '-cli') && !endsWith(github.ref, '-web') && !endsWith(github.ref, '-nethack') && !endsWith(github.ref, '-dopewars') && !endsWith(github.ref, '-dcss') && !endsWith(github.ref, '-usurper') && !endsWith(github.ref, '-brogue')) }}
    needs: [build_ssh, get_web_image, get_nethack_image, get_dopewars_image, get_dcss_image, get_usurper_image, get_brogue_image]
    uses: ./.github/workflows/terraform.yml
    permissions:
      contents: read
    secrets: inherit
    with:
      ssh_image_tag: ${{ needs.build_ssh.outputs.image_tag }}
      web_image_tag: ${{ needs.get_web_image.outputs.web_image_tag }}
      nethack_image_tag: ${{ needs.get_nethack_image.outputs.nethack_image_tag }}
      dopewars_image_tag: ${{ needs.get_dopewars_image.outputs.dopewars_image_tag }}
      dcss_image_tag: ${{ needs.get_dcss_image.outputs.dcss_image_tag }}
      usurper_image_tag: ${{ needs.get_usurper_image.outputs.usurper_image_tag }}
      brogue_image_tag: ${{ needs.get_brogue_image.outputs.brogue_image_tag }}
      environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || (github.event.release.prerelease && 'staging' || 'production') }}
      source_ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref }}

  wait_for_ssh_rollout:
    name: wait_for_ssh_rollout
    if: ${{ (github.event_name == 'workflow_dispatch' && !endsWith(inputs.release_tag, '-infra') && !endsWith(inputs.release_tag, '-cli') && !endsWith(inputs.release_tag, '-web') && !endsWith(inputs.release_tag, '-nethack') && !endsWith(inputs.release_tag, '-dopewars') && !endsWith(inputs.release_tag, '-dcss') && !endsWith(inputs.release_tag, '-usurper') && !endsWith(inputs.release_tag, '-brogue')) || (github.event_name != 'workflow_dispatch' && !endsWith(github.ref, '-infra') && !endsWith(github.ref, '-cli') && !endsWith(github.ref, '-web') && !endsWith(github.ref, '-nethack') && !endsWith(github.ref, '-dopewars') && !endsWith(github.ref, '-dcss') && !endsWith(github.ref, '-usurper') && !endsWith(github.ref, '-brogue')) }}
    needs: terraform
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || (github.event.release.prerelease && 'staging' || 'production') }}
    steps:
      - name: setup_kubectl
        uses: azure/setup-kubectl@v5

      - name: set_kubernetes_context
        uses: azure/k8s-set-context@v5
        with:
          kubeconfig: ${{ secrets.KUBE_CONFIG }}

      - name: wait_for_rollout
        run: kubectl rollout status deployment service-ssh -n default --timeout=180s
