name: deploy

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to deploy, for example v0.27.11"
        required: true
        type: string
      environment:
        description: "Deployment environment"
        required: true
        default: production
        type: choice
        options:
          - production
          - staging

concurrency:
  group: ${{ ((github.event_name == 'workflow_dispatch' && !endsWith(inputs.release_tag, '-infra') && !endsWith(inputs.release_tag, '-cli') && !endsWith(inputs.release_tag, '-web') && !endsWith(inputs.release_tag, '-nethack')) || (github.event_name != 'workflow_dispatch' && !endsWith(github.ref, '-infra') && !endsWith(github.ref, '-cli') && !endsWith(github.ref, '-web') && !endsWith(github.ref, '-nethack'))) && format('deploy-standard-{0}', github.event_name == 'workflow_dispatch' && inputs.environment || (github.event.release.prerelease && 'staging' || 'production')) || format('{0}-{1}', github.workflow, github.run_id) }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  ci:
    name: ci
    if: ${{ (github.event_name == 'workflow_dispatch' && !endsWith(inputs.release_tag, '-infra') && !endsWith(inputs.release_tag, '-cli') && !endsWith(inputs.release_tag, '-web') && !endsWith(inputs.release_tag, '-nethack')) || (github.event_name != 'workflow_dispatch' && !endsWith(github.ref, '-infra') && !endsWith(github.ref, '-cli') && !endsWith(github.ref, '-web') && !endsWith(github.ref, '-nethack')) }}
    uses: ./.github/workflows/ci.yml
    with:
      package: late-ssh
      source_ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref }}

  build_ssh:
    name: build_late_ssh_image
    if: ${{ (github.event_name == 'workflow_dispatch' && !endsWith(inputs.release_tag, '-infra') && !endsWith(inputs.release_tag, '-cli') && !endsWith(inputs.release_tag, '-web') && !endsWith(inputs.release_tag, '-nethack')) || (github.event_name != 'workflow_dispatch' && !endsWith(github.ref, '-infra') && !endsWith(github.ref, '-cli') && !endsWith(github.ref, '-web') && !endsWith(github.ref, '-nethack')) }}
    needs: ci
    uses: ./.github/workflows/build.yml
    permissions:
      contents: read
      packages: write
    secrets: inherit
    with:
      registry: ghcr.io
      image_name: late-ssh
      image_tag: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.event.release.tag_name }}
      context: .
      dockerfile: ./Dockerfile
      docker_target: runtime-ssh
      environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || (github.event.release.prerelease && 'staging' || 'production') }}
      source_ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref }}

  get_web_image:
    name: get_current_web_image_tag
    if: ${{ (github.event_name == 'workflow_dispatch' && !endsWith(inputs.release_tag, '-infra') && !endsWith(inputs.release_tag, '-cli') && !endsWith(inputs.release_tag, '-web') && !endsWith(inputs.release_tag, '-nethack')) || (github.event_name != 'workflow_dispatch' && !endsWith(github.ref, '-infra') && !endsWith(github.ref, '-cli') && !endsWith(github.ref, '-web') && !endsWith(github.ref, '-nethack')) }}
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || (github.event.release.prerelease && 'staging' || 'production') }}
    outputs:
      web_image_tag: ${{ steps.web_image.outputs.image_tag }}
    steps:
      - name: setup_kubectl
        uses: azure/setup-kubectl@v5

      - name: set_kubernetes_context
        uses: azure/k8s-set-context@v5
        with:
          kubeconfig: ${{ secrets.KUBE_CONFIG }}

      - name: get_web_image_tag
        id: web_image
        run: |
          tag=$(kubectl get deployment service-web -n default -o jsonpath='{.spec.template.spec.containers[0].image}')
          echo "image_tag=$tag" >> "$GITHUB_OUTPUT"

  get_nethack_image:
    name: get_current_nethack_image_tag
    if: ${{ (github.event_name == 'workflow_dispatch' && !endsWith(inputs.release_tag, '-infra') && !endsWith(inputs.release_tag, '-cli') && !endsWith(inputs.release_tag, '-web') && !endsWith(inputs.release_tag, '-nethack')) || (github.event_name != 'workflow_dispatch' && !endsWith(github.ref, '-infra') && !endsWith(github.ref, '-cli') && !endsWith(github.ref, '-web') && !endsWith(github.ref, '-nethack')) }}
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || (github.event.release.prerelease && 'staging' || 'production') }}
    outputs:
      nethack_image_tag: ${{ steps.nethack_image.outputs.image_tag }}
    steps:
      - name: setup_kubectl
        uses: azure/setup-kubectl@v5

      - name: set_kubernetes_context
        uses: azure/k8s-set-context@v5
        with:
          kubeconfig: ${{ secrets.KUBE_CONFIG }}

      - name: get_nethack_image_tag
        id: nethack_image
        env:
          # Bootstrap fallback: on the first deploy after the NetHack extraction
          # the late-nethack deployment does not exist yet, so the lookup is empty.
          # Fall back to the image for this release; the real bootstrap path is
          # deploy_nethack.yml (a `-nethack` release), which builds+pushes it.
          FALLBACK_TAG: ghcr.io/${{ github.repository }}/late-nethack:${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.event.release.tag_name }}
          # Door enable flag (empty defaults to on, matching infra/nethack.tf).
          NETHACK_ENABLED: ${{ vars.NETHACK_ENABLED }}
        run: |
          tag=$(kubectl get deployment late-nethack -n default -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null || true)
          if [ -z "$tag" ]; then
            # No live late-nethack image. If the door is enabled, terraform would
            # create the Deployment with an unverified placeholder tag and hit
            # ImagePullBackOff while service-ssh advertises the door as up. Fail
            # loudly instead: the door must be bootstrapped via deploy_nethack.yml
            # first. When disabled the Deployment is count=0, so the placeholder is
            # never pulled and we proceed.
            enabled=$(echo "${NETHACK_ENABLED:-1}" | tr '[:upper:]' '[:lower:]')
            case "$enabled" in
              1|true|yes|on)
                echo "::error::late-nethack deployment not found but the NetHack door is enabled. Bootstrap it first with deploy_nethack.yml (a -nethack release or workflow_dispatch), then re-run this deploy."
                exit 1 ;;
              *)
                echo "late-nethack absent and door disabled; using placeholder ${FALLBACK_TAG} (no Deployment will be created)." ;;
            esac
            tag="${FALLBACK_TAG}"
          fi
          echo "image_tag=$tag" >> "$GITHUB_OUTPUT"

  terraform:
    name: terraform_apply
    if: ${{ (github.event_name == 'workflow_dispatch' && !endsWith(inputs.release_tag, '-infra') && !endsWith(inputs.release_tag, '-cli') && !endsWith(inputs.release_tag, '-web') && !endsWith(inputs.release_tag, '-nethack')) || (github.event_name != 'workflow_dispatch' && !endsWith(github.ref, '-infra') && !endsWith(github.ref, '-cli') && !endsWith(github.ref, '-web') && !endsWith(github.ref, '-nethack')) }}
    needs: [build_ssh, get_web_image, get_nethack_image]
    uses: ./.github/workflows/terraform.yml
    permissions:
      contents: read
    secrets: inherit
    with:
      ssh_image_tag: ${{ needs.build_ssh.outputs.image_tag }}
      web_image_tag: ${{ needs.get_web_image.outputs.web_image_tag }}
      nethack_image_tag: ${{ needs.get_nethack_image.outputs.nethack_image_tag }}
      environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || (github.event.release.prerelease && 'staging' || 'production') }}
      source_ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref }}

  wait_for_ssh_rollout:
    name: wait_for_ssh_rollout
    if: ${{ (github.event_name == 'workflow_dispatch' && !endsWith(inputs.release_tag, '-infra') && !endsWith(inputs.release_tag, '-cli') && !endsWith(inputs.release_tag, '-web') && !endsWith(inputs.release_tag, '-nethack')) || (github.event_name != 'workflow_dispatch' && !endsWith(github.ref, '-infra') && !endsWith(github.ref, '-cli') && !endsWith(github.ref, '-web') && !endsWith(github.ref, '-nethack')) }}
    needs: terraform
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || (github.event.release.prerelease && 'staging' || 'production') }}
    steps:
      - name: setup_kubectl
        uses: azure/setup-kubectl@v5

      - name: set_kubernetes_context
        uses: azure/k8s-set-context@v5
        with:
          kubeconfig: ${{ secrets.KUBE_CONFIG }}

      - name: wait_for_rollout
        run: kubectl rollout status deployment service-ssh -n default --timeout=180s
