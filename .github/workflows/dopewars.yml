name: dopewars

# Dedicated CI/CD for the dopewars door, responsible only for the from-source
# binary image (docker/doors/dopewars.Dockerfile):
#   - build_validate: compile the door Dockerfile and prove the binary
#     works and isn't setgid (a setgid binary silently refuses the per-session
#     `-f` score path). Runs on changes to the build and weekly, to catch
#     upstream / checksum breakage early (the build fetches a pinned tarball
#     from SourceForge over the network).
#   - push_image: on push to main, publish the image the root Dockerfile pins
#     as its dopewars-build stage (ghcr door-dopewars, tag from DOOR_IMAGE_TAG).
#   - verify_deployed: manual, per-environment. Confirms the live late-dopewars
#     deployment is rolled out and the door is enabled. There's no PVC/save
#     state to seed or check.
#
# The late-dopewars host image (runtime-dopewars) builds from the root
# Dockerfile in deploy_dopewars.yml; it is not built here.

on:
  pull_request:
    paths:
      - docker/doors/dopewars.Dockerfile
      - .github/workflows/dopewars.yml
  push:
    branches: [main]
    paths:
      - docker/doors/dopewars.Dockerfile
      - .github/workflows/dopewars.yml
  schedule:
    - cron: "0 6 * * 2" # Tuesdays 06:00 UTC (staggered a day after nethack's)
  workflow_dispatch:
    inputs:
      run_verify_deployed:
        description: "Also verify the door is enabled on the live pod after building"
        required: false
        default: false
        type: boolean
      environment:
        description: "Target environment for verify_deployed"
        required: false
        default: production
        type: choice
        options:
          - production
          - staging

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

# The published door image tag. Must match the pin in the root Dockerfile's
# dopewars-build stage; bump both together on any recipe change.
env:
  DOOR_IMAGE_TAG: 1.6.2-r1

jobs:
  build_validate:
    name: build_validate_dopewars_stage
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: checkout
        uses: actions/checkout@v5

      - name: setup_docker_buildx
        uses: docker/setup-buildx-action@v4

      # Build the door Dockerfile and load it locally so we can run
      # the binary. The stage itself already asserts the binary lands at
      # /dopewars; we re-prove it runs and re-check the setgid invariant here.
      - name: build_dopewars_stage
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/doors/dopewars.Dockerfile
          platforms: linux/amd64
          push: false
          load: true
          tags: dopewars-build:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: smoke_test_binary
        run: |
          docker run --rm dopewars-build:ci /dopewars --version

      # Prove the setgid invariant holds: dopewars silently refuses a user
      # `-f` score path under setgid, which would break the per-session score
      # file without erroring loudly (see CONTEXT.md §5).
      - name: verify_not_setgid
        run: |
          docker run --rm dopewars-build:ci sh -c '
            set -e
            mode=$(stat -c "%a" /dopewars)
            if [ -g /dopewars ]; then
              echo "::error::dopewars binary is setgid (mode $mode)"
              exit 1
            fi
            echo "mode $mode OK (not setgid)"
          '

  push_image:
    name: push_door_dopewars_image
    needs: build_validate
    # push: keep the published image in sync with main. workflow_dispatch: the
    # manual bootstrap/re-push lever (first publication happens from the branch
    # that introduces the door Dockerfile, before the root Dockerfile pin can
    # resolve). Scheduled runs never push: the weekly drift check must not
    # silently mutate a pinned tag.
    if: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write
    steps:
      - name: checkout
        uses: actions/checkout@v5

      - name: setup_docker_buildx
        uses: docker/setup-buildx-action@v4

      - name: login_to_ghcr
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Publish the image the root Dockerfile pins as its dopewars-build stage.
      # The tag is stable per recipe revision, so re-pushing it on an unrelated
      # main push is a layer-cached no-op.
      - name: push_door_image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/doors/dopewars.Dockerfile
          platforms: linux/amd64
          push: true
          tags: ghcr.io/${{ github.repository }}/door-dopewars:${{ env.DOOR_IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  verify_deployed:
    name: verify_deployed
    needs: build_validate
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_verify_deployed }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: ${{ inputs.environment }}
    steps:
      - name: setup_kubectl
        uses: azure/setup-kubectl@v5

      - name: set_kubernetes_context
        uses: azure/k8s-set-context@v5
        with:
          kubeconfig: ${{ secrets.KUBE_CONFIG }}

      - name: wait_for_rollout
        run: kubectl rollout status deployment/late-dopewars -n default --timeout=180s

      - name: verify_door_enabled
        run: |
          # LATE_DOPEWARS_ENABLED is a CLIENT flag: it lives on service-ssh (which
          # reaches the host over SSH), NOT on the late-dopewars host pod. Read it
          # there, mirroring nethack.yml.
          POD=$(kubectl get pod -l app=service-ssh -n default -o jsonpath='{.items[0].metadata.name}')
          echo "service-ssh pod: ${POD}"
          enabled=$(kubectl exec "${POD}" -- printenv LATE_DOPEWARS_ENABLED || true)
          echo "LATE_DOPEWARS_ENABLED=${enabled}"
          case "$(echo "${enabled}" | tr '[:upper:]' '[:lower:]')" in
            1|true|yes|on) echo "door enabled" ;;
            *) echo "::warning::dopewars door is not enabled (LATE_DOPEWARS_ENABLED=${enabled})" ;;
          esac
