services:
  lord-bbs:
    build:
      context: ./late-bbs
      dockerfile: Dockerfile
    image: late-sh/lord-bbs:local
    container_name: late-lord-bbs
    ports:
      - "${LORD_BBS_TELNET_PORT:-2323}:23"
      - "${LORD_BBS_SSH_PORT:-2223}:22"
    environment:
      SBBS_HOME: /bbs/sbbs
      LORD_HOME: /bbs/doors/lord
    volumes:
      - ./late-bbs/data:/bbs
    restart: unless-stopped
