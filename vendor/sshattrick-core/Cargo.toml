[package]
name = "sshattrick-core"
version = "0.1.0"
edition = "2021"
authors = ["Alessandro Ricottone <ricott2@gmail.com>"]
license = "MIT OR Apache-2.0"
description = "Pure game logic and asset rendering for sshattrick - hockey in your terminal."
readme = "README.md"
repository = "https://github.com/ricott1/sshattrick"
keywords = ["game", "hockey", "tui"]
categories = ["games"]

[dependencies]
anyhow = "1.0.102"
directories = "6.0.0"
glam = "0.32.1"
image = { version = "0.25.10", default-features = false, features = ["png"] }
include_dir = "0.7.4"
log = "0.4.27"
rand = { version = "0.10.1", default-features = false, features = ["std", "std_rng", "thread_rng"] }
uuid = { version = "1.23.1", default-features = false, features = ["v4", "fast-rng"] }

[dev-dependencies]
crossterm = { version = "0.29", default-features = false, features = ["events"] }
log4rs = { version = "1.4.0", default-features = false, features = ["file_appender", "pattern_encoder"] }
ratatui = { version = "0.30.0", features = ["unstable-backend-writer"] }
