{% if now_playing_title.is_some() %}
<div>
    <div class="text-white text-sm">{{ now_playing_title.as_deref().unwrap_or_default() }}</div>
    <div class="text-gray-600 text-xs mt-0.5">{{ now_playing_artist.as_deref().unwrap_or("Unknown") }}</div>
</div>
{% else %}
<div class="text-gray-700 text-sm">loading track...</div>
{% endif %}
{% if listeners_count.is_some() %}
<div class="text-xs text-gray-700 mt-2">
    <span class="text-green-700">{{ listeners_count.unwrap_or_default() }}</span> listening
</div>
{% endif %}
