{% extends "pages/layout.html" %}

{% block title %}Chat - late.sh{% endblock %}

{% block page %}
<style>
    :root {
        --chat-vh: 100dvh;
    }

    html, body {
        overflow: hidden !important;
        overscroll-behavior: none;
        touch-action: manipulation;
    }

    .chat-shell {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: var(--chat-vh, 100dvh);
        max-width: 32rem;
        margin: 0 auto;
        padding: 0.75rem 1rem 0.5rem;
        overflow: hidden;
    }

    #messages { overflow-anchor: none; }
    #messages > .anchor { overflow-anchor: auto; height: 0; }
    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-thumb { background: #374151; border-radius: 2px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
</style>

<script>
    function chat() {
        return {
            ws: null,
            reconnectTimer: null,
            reconnectDelayMs: 3000,
            manualDisconnect: false,
            status: 'connecting',
            token: '{{ token }}',
            apiUrl: '{{ api_url }}',
            messages: [],
            input: '',
            username: '',
            userId: '',
            atBottom: true,
            messageHistory: [],
            historyIndex: null,

            init() {
                this.updateViewportHeight();
                const viewport = window.visualViewport;
                if (viewport) {
                    viewport.addEventListener('resize', () => this.handleViewportChange());
                    viewport.addEventListener('scroll', () => this.handleViewportChange());
                }
                window.addEventListener('resize', () => this.updateViewportHeight());
                this.connectWs();
                this.$nextTick(() => {
                    const el = this.$refs.messages;
                    if (el) {
                        el.addEventListener('scroll', () => {
                            this.atBottom = el.scrollTop + el.clientHeight >= el.scrollHeight - 40;
                        });
                    }
                });
            },

            handleViewportChange() {
                this.updateViewportHeight();
            },

            updateViewportHeight() {
                const height = window.visualViewport ? window.visualViewport.height : window.innerHeight;
                document.documentElement.style.setProperty('--chat-vh', `${height}px`);
            },

            scheduleReconnect() {
                if (this.manualDisconnect || this.reconnectTimer) return;
                this.status = 'reconnecting';
                this.reconnectTimer = window.setTimeout(() => {
                    this.reconnectTimer = null;
                    this.connectWs();
                }, this.reconnectDelayMs);
            },

            connectWs() {
                if (this.reconnectTimer) {
                    window.clearTimeout(this.reconnectTimer);
                    this.reconnectTimer = null;
                }
                if (this.ws) {
                    this.ws.onopen = null;
                    this.ws.onmessage = null;
                    this.ws.onclose = null;
                    this.ws.onerror = null;
                    if (this.ws.readyState === WebSocket.OPEN || this.ws.readyState === WebSocket.CONNECTING) {
                        this.ws.close(1000, 'replaced');
                    }
                }

                this.manualDisconnect = false;
                this.status = 'connecting';
                const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                const wsUrl = `${protocol}//${this.apiUrl}/api/ws/chat?token=${this.token}`;
                this.ws = new WebSocket(wsUrl);

                this.ws.onopen = () => {
                    this.status = 'connected';
                };

                this.ws.onmessage = (event) => {
                    let payload;
                    try { payload = JSON.parse(event.data); } catch { return; }

                    switch (payload.event) {
                        case 'init':
                            this.username = payload.username;
                            this.userId = payload.user_id;
                            this.messages = payload.messages;
                            this.status = 'ready';
                            this.$nextTick(() => this.scrollToBottom());
                            break;
                        case 'message':
                            const shouldStickToBottom = this.atBottom;
                            this.messages.push(payload);
                            if (shouldStickToBottom) {
                                this.$nextTick(() => this.scrollToBottom());
                            }
                            break;
                        case 'message_deleted':
                            this.messages = this.messages.filter(m => m.id !== payload.message_id);
                            break;
                    }
                };

                this.ws.onclose = () => {
                    if (this.manualDisconnect) return;
                    this.scheduleReconnect();
                };

                this.ws.onerror = () => {
                    if (this.manualDisconnect) return;
                    this.scheduleReconnect();
                };
            },

            refreshConnection() {
                this.manualDisconnect = true;
                if (this.reconnectTimer) {
                    window.clearTimeout(this.reconnectTimer);
                    this.reconnectTimer = null;
                }
                if (this.ws && (this.ws.readyState === WebSocket.OPEN || this.ws.readyState === WebSocket.CONNECTING)) {
                    this.ws.close(1000, 'manual refresh');
                }
                this.connectWs();
            },

            send() {
                const body = this.input.trim();
                if (!body || !this.ws || this.ws.readyState !== WebSocket.OPEN) return;
                this.ws.send(JSON.stringify({ event: 'send', body }));
                this.messageHistory.unshift(body);
                if (this.messageHistory.length > 20) this.messageHistory.pop();
                this.historyIndex = null;
                this.input = '';
            },

            historyUp() {
                if (this.messageHistory.length === 0) return;
                if (this.historyIndex === null) {
                    this.historyIndex = 0;
                } else if (this.historyIndex < this.messageHistory.length - 1) {
                    this.historyIndex++;
                } else {
                    return; // already at oldest
                }
                this.input = this.messageHistory[this.historyIndex];
                this.$nextTick(() => {
                    const el = this.$refs.inputField;
                    if (el) el.setSelectionRange(el.value.length, el.value.length);
                });
            },

            historyDown() {
                if (this.historyIndex === null) {
                    if (this.input.trim()) {
                        this.messageHistory.unshift(this.input);
                        if (this.messageHistory.length > 20) this.messageHistory.pop();
                        this.input = '';
                    }
                    // empty input: do nothing
                } else if (this.historyIndex === 0) {
                    this.historyIndex = null;
                    this.input = '';
                } else {
                    this.historyIndex--;
                    this.input = this.messageHistory[this.historyIndex];
                    this.$nextTick(() => {
                        const el = this.$refs.inputField;
                        if (el) el.setSelectionRange(el.value.length, el.value.length);
                    });
                }
            },

            scrollToBottom() {
                const el = this.$refs.messages;
                if (el) el.scrollTop = el.scrollHeight;
            },

            formatTime(iso) {
                const d = new Date(iso);
                const now = new Date();
                const diff = now - d;
                if (diff < 60000) return 'now';
                if (diff < 3600000) return Math.floor(diff / 60000) + 'm';
                if (diff < 86400000) return Math.floor(diff / 3600000) + 'h';
                return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
            },

            isOwn(msg) {
                return msg.user_id === this.userId;
            }
        }
    }
</script>

<div x-data="chat()" class="chat-shell flex flex-col mx-auto">

    <!-- Header -->
    <div class="flex items-center justify-between py-2 border-b border-gray-700/60 shrink-0">
        <div>
            <span class="text-green-500 text-lg tracking-tight">late.sh</span>
            <span class="text-gray-600 text-sm ml-2">#general</span>
        </div>
        <div class="flex items-center gap-3" x-cloak>
            <div class="text-xs text-right">
                <span x-show="status === 'connecting' || status === 'connected'" class="text-yellow-600">connecting...</span>
                <span x-show="status === 'ready'" class="text-green-600">
                    <span class="inline-block w-1.5 h-1.5 rounded-full bg-current mr-1"></span>live
                </span>
                <span x-show="status === 'reconnecting'" class="text-yellow-600">reconnecting...</span>
                <span x-show="status === 'error'" class="text-red-500">disconnected</span>
            </div>
            <button type="button"
                    @click="refreshConnection()"
                    class="inline-flex items-center justify-center w-8 h-8 rounded border border-gray-700/60 text-gray-500 hover:text-green-500 hover:border-green-800/60 transition-colors"
                    aria-label="Refresh connection"
                    title="Refresh connection">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M21 2v6h-6"></path>
                    <path d="M3 12a9 9 0 0 1 15.3-6.36L21 8"></path>
                    <path d="M3 22v-6h6"></path>
                    <path d="M21 12a9 9 0 0 1-15.3 6.36L3 16"></path>
                </svg>
            </button>
        </div>
    </div>

    <!-- Messages -->
    <div x-ref="messages" id="messages" class="flex-1 overflow-y-auto py-3 space-y-1 min-h-0">
        <div x-show="status === 'connecting' || status === 'connected'" x-cloak
             class="flex items-center justify-center h-full text-gray-600 text-sm">loading...</div>
        <div x-show="status === 'ready' && messages.length === 0" x-cloak
             class="flex items-center justify-center h-full text-gray-600 text-sm">no messages yet</div>
        <template x-for="msg in messages" :key="msg.id">
            <div class="px-1 py-0.5 text-sm leading-relaxed">
                <span class="text-gray-600 text-xs mr-1" x-text="formatTime(msg.created)"></span>
                <span class="font-medium" :class="isOwn(msg) ? 'text-green-500' : 'text-amber-400'" x-text="msg.username || 'anon'"></span>
                <span class="text-gray-500 mx-0.5">:</span>
                <span class="text-gray-300 break-words" x-text="msg.body"></span>
            </div>
        </template>
        <div class="anchor"></div>
    </div>

    <!-- Scroll to bottom indicator -->
    <div x-cloak x-show="!atBottom && status === 'ready'" class="text-center py-1 shrink-0">
        <button @click="atBottom = true; $refs.messages.scrollTo({ top: $refs.messages.scrollHeight, behavior: 'smooth' })" class="text-xs text-gray-500 hover:text-green-500 transition-colors">
            new messages below
        </button>
    </div>

    <!-- Input -->
    <div class="pt-2 pb-1 border-t border-gray-700 shrink-0">
        <form @submit.prevent.stop="send()" class="flex gap-2">
            <input x-model="input"
                   x-ref="inputField"
                   @keydown.up.prevent="historyUp()"
                   @keydown.down.prevent="historyDown()"
                   :disabled="status !== 'ready'"
                   placeholder="say something..."
                   autocomplete="off"
                   class="flex-1 bg-gray-900/60 border border-gray-700 focus:border-green-800 text-gray-200 text-sm px-3 py-2.5 outline-none placeholder-gray-600 transition-colors"
            >
            <button type="submit"
                    :disabled="status !== 'ready' || !input.trim()"
                    class="px-4 py-2.5 text-sm border transition-colors duration-200"
                    :class="status === 'ready' && input.trim()
                        ? 'border-green-800 text-green-500 hover:bg-green-900/20'
                        : 'border-gray-800 text-gray-700 cursor-default'">
                send
            </button>
        </form>
        <div class="mt-2 text-xs text-gray-700" x-show="username" x-cloak>
            signed in as <span class="text-gray-500" x-text="username"></span>
        </div>
    </div>
</div>
{% endblock %}
